name: Smoke executor

# One-tap Fly ladder smoke (direct + ISP). Does not redeploy.
# Actions → "Smoke executor" → Run workflow.
# Uses the same EXECUTOR_TOKEN as Deploy executor.

on:
  workflow_dispatch:
    inputs:
      with_card:
        description: "Inject KMART_CARD_* secrets (may hit 3DS / bank)"
        type: boolean
        default: false
      place_order:
        description: "Real placeOrder (requires card secrets)"
        type: boolean
        default: false
      skip_isp:
        description: "Skip ISP pool smoke (direct only)"
        type: boolean
        default: false
      skip_direct:
        description: "Skip direct smoke (ISP is the live charge-path class)"
        type: boolean
        default: false

concurrency:
  group: smoke-executor
  cancel-in-progress: false

jobs:
  smoke:
    name: Fly ladder smoke
    runs-on: ubuntu-latest
    env:
      EXECUTOR_URL: https://j1ms-bot-executor.fly.dev
      EXECUTOR_TOKEN: ${{ secrets.EXECUTOR_TOKEN }}
      KMART_CARD_NUMBER: ${{ secrets.KMART_CARD_NUMBER }}
      KMART_CARD_CVV: ${{ secrets.KMART_CARD_CVV }}
      KMART_CARD_EXPIRY_MONTH: ${{ secrets.KMART_CARD_EXPIRY_MONTH }}
      KMART_CARD_EXPIRY_YEAR: ${{ secrets.KMART_CARD_EXPIRY_YEAR }}
      KMART_CARD_HOLDER: ${{ secrets.KMART_CARD_HOLDER }}
      SMOKE_OUT_DIR: ${{ github.workspace }}/smoke-out
      SMOKE_TIMEOUT: "240"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Verify EXECUTOR_TOKEN
        run: |
          if [ -z "$EXECUTOR_TOKEN" ]; then
            echo "::error::EXECUTOR_TOKEN secret missing"
            exit 1
          fi
          echo "tip health:"
          curl -sS --max-time 15 "$EXECUTOR_URL/health" || true
          echo

      - name: Direct dry-run (often SoftBlocked on Fly egress)
        if: ${{ !inputs.skip_direct }}
        env:
          SMOKE_USE_PROXY: "0"
          SMOKE_WITH_CARD: ${{ inputs.with_card && '1' || '0' }}
          SMOKE_PLACE_ORDER: ${{ inputs.place_order && '1' || '0' }}
        run: |
          chmod +x executor/scripts/fly-smoke.sh
          set +e
          bash executor/scripts/fly-smoke.sh
          rc=$?
          set -e
          echo "direct_rc=$rc" >> "$GITHUB_ENV"
          # Advisory — do not fail the job on sensor flake alone.
          if [ "$rc" = "0" ]; then
            echo "direct=pass" >> "$GITHUB_ENV"
          else
            echo "direct=fail_$rc" >> "$GITHUB_ENV"
          fi

      - name: ISP pool dry-run
        if: ${{ !inputs.skip_isp }}
        env:
          SMOKE_USE_PROXY: "1"
          SMOKE_WITH_CARD: "0"
          SMOKE_PLACE_ORDER: "0"
        run: |
          set +e
          bash executor/scripts/fly-smoke.sh
          rc=$?
          set -e
          echo "isp_rc=$rc" >> "$GITHUB_ENV"
          if [ "$rc" = "0" ]; then
            echo "isp=pass" >> "$GITHUB_ENV"
          else
            echo "isp=fail_$rc" >> "$GITHUB_ENV"
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fly-smoke-${{ github.run_id }}
          path: smoke-out/
          if-no-files-found: warn

      - name: Summarize
        if: always()
        run: |
          echo "## Fly smoke summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- health tip: see log above" >> "$GITHUB_STEP_SUMMARY"
          echo "- direct: \`${direct:-skipped}\` (Fly egress SoftBlock is common — score **ISP**)" >> "$GITHUB_STEP_SUMMARY"
          echo "- isp: \`${isp:-n/a}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Score these fields (not CI green/red)" >> "$GITHUB_STEP_SUMMARY"
          for f in smoke-out/*.summary.json; do
            [ -f "$f" ] || continue
            python3 -c '
import json, sys
d = json.load(open(sys.argv[1]))
print("#### `%s` — **%s**" % (d.get("mode"), d.get("verdict") or "n/a"))
print("- wall: `%s`" % d.get("wall"))
print("- cleared: `%s`" % (" → ".join(d.get("ladderCleared") or []) or "(none)"))
print("- ip / transport: `%s` / `%s`" % (d.get("resolveIp"), d.get("transport")))
print("- apiTls: `%s`" % d.get("apiTlsNote"))
print("")
print("```json")
print(json.dumps(d, indent=2)[:4500])
print("```")
' "$f" >> "$GITHUB_STEP_SUMMARY"
          done
          # Hard-fail the job only when ISP cleared sensors/PDP/token but cart still denied
          # OR when ISP never started. Direct SoftBlock alone is not a regression.
          if [ "${isp_rc:-}" = "2" ]; then
            echo "::error::ISP wall is cart_get/GraphQL (or earlier hard fail). Check verdict in artifacts."
            exit 1
          fi
          if [ "${isp_rc:-}" = "3" ]; then
            echo "::warning::ISP sensor flake — retry once, do not SoftBlock-poll"
          fi
          if [ "${direct_rc:-}" = "3" ]; then
            echo "::warning::Direct SoftBlock on Fly egress — expected; score ISP ladder"
          fi
          echo "Done."
