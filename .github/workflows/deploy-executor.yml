name: Deploy executor

# Manually triggered from the GitHub mobile app or web UI:
#   Actions tab -> "Deploy executor" -> Run workflow.
# First run: tick `create_app` so the Fly app gets created before deploy.

on:
  workflow_dispatch:
    inputs:
      create_app:
        description: "Create the Fly app first (tick on the very first run only)"
        type: boolean
        default: false
      app_name:
        description: "Fly app name"
        type: string
        default: "j1ms-bot-executor"
      region:
        description: "Preferred Fly region (default: syd for AU latency)"
        type: string
        default: "syd"
      fallback_region:
        description: "Fallback region if the preferred region has no capacity"
        type: string
        default: "lax"

concurrency:
  group: deploy-executor
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy executor to Fly.io
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: ${{ inputs.app_name }}
      REGION: ${{ inputs.region }}
      FALLBACK_REGION: ${{ inputs.fallback_region }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Verify FLY_API_TOKEN is set
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app (first run only)
        if: ${{ inputs.create_app }}
        run: |
          if flyctl status --app "$APP" >/dev/null 2>&1; then
            echo "App $APP already exists, skipping create."
          else
            flyctl apps create "$APP" --org personal
          fi

      - name: Stage runtime secrets on Fly
        env:
          EXECUTOR_TOKEN: ${{ secrets.EXECUTOR_TOKEN }}
          HYPER_API_KEY: ${{ secrets.HYPER_API_KEY }}
          PROXY_URL_RESI: ${{ secrets.PROXY_URL_RESI }}
          PROXY_RESI_LIST: ${{ secrets.PROXY_RESI_LIST }}
          EXECUTOR_HTTP_TRANSPORT: ${{ secrets.EXECUTOR_HTTP_TRANSPORT }}
        run: |
          missing=0
          for var in EXECUTOR_TOKEN HYPER_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Repo secret $var is not set."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

          # Proxies: prefer baked executor/resi.proxies or PROXY_RESI_LIST.
          # PROXY_URL_RESI is optional legacy single-URL fallback (not required).
          if [ -z "$PROXY_URL_RESI" ] && [ -z "$PROXY_RESI_LIST" ]; then
            echo "::notice::No PROXY_URL_RESI / PROXY_RESI_LIST — using executor/resi.proxies if present, or body.proxies on /run."
          fi

          secret_args=(
            "EXECUTOR_TOKEN=$EXECUTOR_TOKEN"
            "HYPER_API_KEY=$HYPER_API_KEY"
          )
          if [ -n "$PROXY_URL_RESI" ]; then
            secret_args+=("PROXY_URL_RESI=$PROXY_URL_RESI")
          fi
          if [ -n "$PROXY_RESI_LIST" ]; then
            secret_args+=("PROXY_RESI_LIST=$PROXY_RESI_LIST")
          fi
          if [ -n "$EXECUTOR_HTTP_TRANSPORT" ]; then
            secret_args+=("EXECUTOR_HTTP_TRANSPORT=$EXECUTOR_HTTP_TRANSPORT")
          fi

          flyctl secrets set \
            "${secret_args[@]}" \
            --app "$APP" --stage


      - name: Deploy executor (with region fallback)
        working-directory: executor
        run: |
          set +e
          deploy_region() {
            local region="$1"
            local sha
            sha=$(git -C .. rev-parse HEAD)
            echo "::group::flyctl deploy --primary-region $region sha=$sha"
            flyctl deploy \
              --remote-only \
              --ha=false \
              --app "$APP" \
              --config fly.toml \
              --dockerfile Dockerfile \
              --build-arg "GIT_SHA=$sha" \
              --primary-region "$region" \
              2>&1 | tee /tmp/deploy.log
            local rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            return $rc
          }

          deploy_region "$REGION"
          rc=$?

          if [ $rc -ne 0 ]; then
            if grep -qiE 'no capacity|capacity|unavailable in region|no active leases' /tmp/deploy.log; then
              echo "::warning::Region $REGION out of capacity — retrying in $FALLBACK_REGION"
              deploy_region "$FALLBACK_REGION"
              rc=$?
              if [ $rc -ne 0 ]; then
                echo "::error::Fallback deploy in $FALLBACK_REGION also failed"
                exit $rc
              fi
              echo "DEPLOYED_REGION=$FALLBACK_REGION" >> "$GITHUB_ENV"
            else
              echo "::error::Deploy failed for a non-capacity reason — see log above"
              exit $rc
            fi
          else
            echo "DEPLOYED_REGION=$REGION" >> "$GITHUB_ENV"
          fi

      - name: Print app hostname
        run: |
          echo "Executor hostname:"
          HOST=$(flyctl status --app "$APP" --json | jq -r '.Hostname')
          ACTUAL_REGION=$(flyctl status --app "$APP" --json | jq -r '.Machines[0].region // "unknown"')
          echo "$HOST  region=$ACTUAL_REGION  (requested=$REGION, fallback=$FALLBACK_REGION)"
          echo ""
          echo "Health check:"
          HEALTH=$(curl -sSf "https://$HOST/health" || echo "")
          echo "$HEALTH"
          if [ "$ACTUAL_REGION" = "syd" ]; then
            echo "Region: Sydney (ideal for Kmart AU latency)"
          else
            echo "Region: $ACTUAL_REGION — Sydney was unavailable; re-run the workflow later to try syd again"
          fi


