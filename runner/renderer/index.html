<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>J1m's Bot — Runner</title>
  <style>
    :root {
      --bg: #0b0b0d; --panel: #15151a; --border: #2a2a32;
      --fg: #e6e6ea; --muted: #8a8a95; --accent: #f5b400; --ok: #4ade80; --err: #f87171;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 -apple-system, system-ui, sans-serif; padding: 18px; }
    h1 { font-size: 16px; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
    h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    h1 .dot.polling { background: var(--accent); }
    h1 .dot.running { background: #60a5fa; animation: pulse 1s infinite; }
    h1 .dot.error   { background: var(--err); }
    @keyframes pulse { 50% { opacity: .35; } }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; align-items: center; }
    label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    input { width: 100%; background: #0a0a0e; border: 1px solid var(--border); color: var(--fg); padding: 8px 10px; border-radius: 6px; font: inherit; }
    button { background: var(--accent); color: #111; border: 0; padding: 8px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button.secondary { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .log { max-height: 200px; overflow: auto; font-family: ui-monospace, monospace; font-size: 12px; }
    .log .ok  { color: var(--ok); }
    .log .err { color: var(--err); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <h1><span id="dot" class="dot"></span> J1m's Bot — Runner <span id="status" class="muted" style="margin-left:auto;font-weight:normal;font-size:12px;">idle</span></h1>

  <div class="card">
    <label>Control plane URL</label>
    <div class="row">
      <input id="url" placeholder="https://your-project.lovable.app" />
      <button class="secondary" id="saveUrl">Save</button>
    </div>
    <label style="margin-top:10px;">Device name</label>
    <div class="row">
      <input id="name" placeholder="My MacBook" />
      <button class="secondary" id="saveName">Save</button>
    </div>
  </div>

  <div class="card">
    <label>Pairing code</label>
    <div class="row">
      <input id="code" placeholder="6-char code from Settings → Local runner" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;" />
      <button id="pair">Pair</button>
    </div>
    <div id="pairMsg" class="muted" style="margin-top:8px;font-size:12px;"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <div>
        <div style="font-weight:600;">Runner loop</div>
        <div class="muted" id="loopMsg" style="font-size:12px;">Not started</div>
      </div>
      <div class="row">
        <button id="start">Start</button>
        <button class="secondary" id="stop">Stop</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:600;margin-bottom:6px;">Recent jobs</div>
    <div id="log" class="log muted">No jobs yet.</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const dot = $("dot"), statusEl = $("status"), logEl = $("log");

  function setStatus(s, err) {
    dot.className = "dot " + s;
    statusEl.textContent = err ? `${s} — ${err}` : s;
  }

  function appendLog(html) {
    if (logEl.classList.contains("muted")) { logEl.classList.remove("muted"); logEl.innerHTML = ""; }
    const div = document.createElement("div");
    div.innerHTML = html;
    logEl.prepend(div);
  }

  async function refresh() {
    const c = await window.runner.getConfig();
    $("url").value  = c.controlPlaneUrl || "";
    $("name").value = c.deviceName || "Runner";
    setStatus(c.status || "idle", c.lastError);
  }

  $("saveUrl").onclick  = async () => { await window.runner.saveConfig({ controlPlaneUrl: $("url").value, deviceName: $("name").value }); };
  $("saveName").onclick = async () => { await window.runner.saveConfig({ controlPlaneUrl: $("url").value, deviceName: $("name").value }); };

  $("pair").onclick = async () => {
    await window.runner.saveConfig({ controlPlaneUrl: $("url").value, deviceName: $("name").value });
    const r = await window.runner.pair($("code").value);
    $("pairMsg").textContent = r.ok ? `Paired ✓ device ${r.deviceId.slice(0,8)}…` : `✗ ${r.error}`;
    $("pairMsg").style.color = r.ok ? "var(--ok)" : "var(--err)";
  };

  $("start").onclick = async () => {
    const r = await window.runner.start();
    if (!r.ok) { $("loopMsg").textContent = r.error; return; }
    $("loopMsg").textContent = "Polling for jobs…";
  };
  $("stop").onclick = async () => { await window.runner.stop(); $("loopMsg").textContent = "Stopped"; setStatus("idle"); };

  window.runner.onEvent((evt) => {
    if (evt.type === "status") setStatus(evt.status, evt.error);
    if (evt.type === "job-start") appendLog(`<span class="muted">${new Date().toLocaleTimeString()}</span> ▶ ${evt.job.id.slice(0,8)} → ${evt.job.storeUrl} ${evt.job.dryRun ? "(dry)" : ""}`);
    if (evt.type === "job-done")  appendLog(`<span class="muted">${new Date().toLocaleTimeString()}</span> <span class="${evt.result.ok ? 'ok':'err'}">${evt.result.ok ? '✓' : '✗'}</span> ${evt.result.jobId.slice(0,8)} — ${evt.result.summary}`);
  });

  refresh();
</script>
</body>
</html>
