app = "j1ms-kmart-monitor"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8091"
  MONITOR_AUTH_MODE = "allowlist"

[http_service]
  internal_port = 8091
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
