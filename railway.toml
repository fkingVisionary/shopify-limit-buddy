# Railway — dashboard (control plane) service
#
# You do NOT need to recreate the Railway project or manually pick a Dockerfile.
# Railway auto-detects the root Dockerfile when Root Directory is the repo root.
#
# One setting that matters on an existing service:
#   Settings → Root Directory → CLEAR IT (blank). Must NOT be `executor`.
#
# Executor stays on Fly.io.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node .output/server/index.mjs"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
