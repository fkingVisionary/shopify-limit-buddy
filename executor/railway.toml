# Railway — deploy the checkout executor only
#
# In the Railway service settings:
#   Root Directory = executor
#   Builder        = Dockerfile  (auto-detected via railway.toml)
#
# Do NOT deploy the repo root to Railway for this bot. The Lovable/TanStack
# control plane is not a Node `dist/` app; Railpack will look for /app/dist
# and fail with:
#   failed to calculate checksum ... "/app/dist": not found

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Railway injects PORT — do not hardcode a public target port in Networking
# unless it matches process.env.PORT. Prefer leaving target port blank /
# default so the edge proxies to whatever PORT the container binds.
